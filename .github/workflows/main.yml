name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: maven

      # 3. Dar permisos al Maven Wrapper
      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw

      # 4. Verificar Java y Maven
      - name: Verify Java and Maven
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          ls -l
          ./mvnw -version

      # 5. Cache SonarQube
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 6. Inyección de secretos en application.properties
      - name: Update db config
        run: |
          sed -i "s|<db_url>|${{ secrets.DB_URL }}|" src/main/resources/application.properties
          sed -i "s|<db_username>|${{ secrets.DB_USERNAME }}|" src/main/resources/application.properties
          sed -i "s|<db_password>|${{ secrets.DB_PASSWORD }}|" src/main/resources/application.properties
        shell: bash

      # 7. Build previo del proyecto
      - name: Build project
        run: ./mvnw clean install -DskipTests

      # ---------------- SEGURIDAD ----------------

      # 8. Instalar Snyk CLI
      - name: Install Snyk CLI
        run: npm install -g snyk

      # 9. Autenticación Snyk
      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # 10. Escaneo Snyk
      - name: Run Snyk Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=pom.xml \
            --package-manager=maven \
            --severity-threshold=high

      # 11. SonarCloud
      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B verify \
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=ZorVaK749_2.4pruebaDevops

      # ---------------- DOCKER ----------------

      # 12. Login DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 13. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # 14. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

      # ---------------- AWS ----------------

      # 15. Configurar credenciales AWS
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 16. Configurar SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 17. Deploy en EC2
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

            docker stop my-app || true
            docker rm my-app || true

            docker run -d \
              --name my-app \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

          EOF