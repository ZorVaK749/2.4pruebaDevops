name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio (con fetch-depth 0 como pide Sonar)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: maven

      # 3. Caches de Sonar (Recomendado por Sonar para velocidad)
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 4. Inyección de secretos en application.properties
      - name: Update db config
        run: |
          sed -i "s|<db_url>|${{ secrets.DB_URL }}|" src/main/resources/application.properties
          sed -i "s|<db_username>|${{ secrets.DB_USERNAME }}|" src/main/resources/application.properties
          sed -i "s|<db_password>|${{ secrets.DB_PASSWORD }}|" src/main/resources/application.properties
        shell: bash

      # --- SEGURIDAD ---

      # 5. Snyk - Análisis de dependencias (Versión corregida)
      - name: Install dependencies
        run: mvn install -DskipTests # Preparamos el proyecto para que Snyk no tenga que descargar nada

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/setup@master

      - name: Snyk Test
        shell: bash
        run: |
          snyk test --severity-threshold=high --maven-aggregate-project
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64 # Ruta típica en el runner de Ubuntu

      # 6. SonarCloud - Análisis de código (Usando tu Project Key)
      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=ZorVaK749_2.4pruebaDevops

      # --- DESPLIEGUE ---

      # 7. Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8. Construir la imagen de Docker
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # 9. Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

      # 10. Configurar credenciales de AWS
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # 11. Agregar clave SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 12. Conectarse a EC2 y desplegar
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            docker stop my-app || true && docker rm my-app || true
            docker run -d --name my-app -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          EOF